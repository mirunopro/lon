<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>REJUVENATION WAR</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#eef0f4;font-family:'Noto Sans JP',sans-serif;-webkit-text-size-adjust:100%}
#hdr{position:sticky;top:0;z-index:50;background:#1a1a2a;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 12px rgba(0,0,0,.4)}
#hdr h1{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:4px;color:#fff}
#hdr p{font-size:10px;color:#8888aa;letter-spacing:3px}
.dot{width:8px;height:8px;border-radius:50%;background:#4af;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
/* TABS */
#tabs{display:flex;background:#111827;border-bottom:2px solid #2a2a3a}
.tab{flex:1;padding:11px;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;color:#666;background:none;border:none;cursor:pointer;transition:all .15s;position:relative}
.tab.on{color:#7aaaff}
.tab.on::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:2px;background:#7aaaff}
.bm-badge{background:#e74c3c;color:#fff;border-radius:10px;font-size:10px;padding:1px 6px;margin-left:5px;font-family:'Noto Sans JP',sans-serif;vertical-align:middle}
/* GRID */
#page-home,#page-bm{padding-bottom:60px}
#sub{padding:12px;font-size:13px;color:#666;text-align:center}
#grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 12px 12px}
.tile{border-radius:12px;padding:20px 14px;cursor:pointer;text-align:left;border:2px solid;transition:all .15s}
.tile .ti{font-size:32px;margin-bottom:8px}
.tile .tn{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;line-height:1.2;margin-bottom:5px}
.tile .tk{font-size:13px;opacity:.7}
/* DETAIL */
#det{padding:0 12px;display:none}
#emp{padding:60px 20px;text-align:center;color:#bbb;font-size:15px;line-height:3}
.dtop{border-radius:10px;padding:14px 16px;margin-bottom:12px;margin-top:4px}
.dtop h2{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:#fff}
.dtop p{font-size:14px;color:rgba(255,255,255,.75);margin-top:3px}
.card{background:#fff;border-radius:10px;padding:16px;margin-bottom:12px;border-left:5px solid #ccc;box-shadow:0 2px 6px rgba(0,0,0,.06)}
.ctitle{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;margin-bottom:12px;padding-left:8px;border-left:3px solid}
.ctext{font-size:17px;line-height:2.1;color:#222}
/* ITEMS */
.nitem,.ditem,.hitem{display:flex;gap:10px;margin-bottom:10px;align-items:flex-start;padding:12px;border-radius:8px;position:relative}
.nitem{background:#fff9f0;border:2px solid #f0c070;border-left:5px solid #e67e22}
.ditem{background:#fff5f5;border:2px solid #f5c0c0;border-left:5px solid #e74c3c}
.hitem{background:#f0fff4;border:2px solid #b0e0c0;border-left:5px solid #27ae60}
.ibullet{font-size:18px;flex-shrink:0;margin-top:2px}
.itext{font-size:17px;line-height:1.9;flex:1;padding-right:36px}
/* BOOKMARK BTN */
.bmbtn{position:absolute;top:10px;right:10px;background:none;border:none;font-size:22px;cursor:pointer;line-height:1;padding:2px;-webkit-tap-highlight-color:transparent}
/* BOOKMARK PAGE */
#page-bm{display:none;padding:14px 12px 60px}
.bm-empty{padding:60px 20px;text-align:center;color:#bbb;font-size:15px;line-height:3}
.bm-card{background:#fff;border-radius:10px;padding:14px 15px;margin-bottom:10px;border-left:5px solid #7aaaff;box-shadow:0 2px 6px rgba(0,0,0,.06);position:relative}
.bm-tag{font-size:10px;color:#7aaaff;letter-spacing:1px;margin-bottom:5px;font-family:'Bebas Neue',sans-serif}
.bm-text{font-size:16px;color:#222;line-height:1.85}
.bm-src{font-size:11px;color:#aaa;margin-top:5px}
.bm-del{position:absolute;top:12px;right:12px;background:none;border:none;font-size:18px;cursor:pointer;color:#ccc;-webkit-tap-highlight-color:transparent}
.bm-del:active{color:#e74c3c}
.bm-clear{display:block;width:calc(100% - 24px);margin:0 12px 16px;padding:11px;background:none;border:2px solid #e74c3c;border-radius:8px;color:#e74c3c;font-size:14px;letter-spacing:1px;cursor:pointer;font-family:'Bebas Neue',sans-serif}
</style>
</head>
<body>
<div id="hdr">
  <div><h1>REJUVENATION WAR</h1><p>LONGEVITY INTELLIGENCE</p></div>
  <div style="display:flex;align-items:center;gap:7px"><div class="dot"></div><span style="font-size:11px;color:#8888aa;letter-spacing:2px">LIVE</span></div>
</div>
<div id="tabs">
  <button class="tab on" onclick="showPage('home')">&#9672; INTEL</button>
  <button class="tab" onclick="showPage('bm')">&#9733; BOOKMARK <span class="bm-badge" id="bm-count" style="display:none">0</span></button>
</div>

<!-- HOME PAGE -->

<div id="page-home">
  <div id="sub">&#9670; タップして情報を表示</div>
  <div id="grid"></div>
  <div id="det"></div>
  <div id="emp">上のタイルをタップすると<br>業界インテリジェンスが表示されます</div>
</div>

<!-- BOOKMARK PAGE -->

<div id="page-bm">
  <button class="bm-clear" onclick="clearAll()">&#10005; ブックマークをすべて削除</button>
  <div id="bm-list"></div>
</div>

<script>
var DATA=[
  {id:"altos",label:"Altos Labs",kana:"アルトス・ラボ",icon:"🔬",bg:"#1a2a4a",bc:"#2a4a8a",ac:"#2a5aaa",tc:"#7aaaff",ov:"Amazonのジェフ・ベゾスらが出資した細胞リプログラミング企業。2022年に30億ドルを調達。山中伸弥ら世界トップの科学者を年俸100万ドル超で引き抜いた。目標は細胞を若い状態にリセットすること。",nw:["Altos LabsがNature誌に細胞リプログラミングの部分的成功を発表。マウス実験で平均寿命25%延長を確認。","山中伸弥が顧問を退任。後継者をめぐる内部対立が噂される。","英国ケンブリッジに新研究拠点を設立。欧州の研究者獲得競争が激化。","競合のRetro Biosciencesが類似特許を申請。特許係争に発展する可能性。"],dr:["科学者を金で囲い込む知的資本争奪戦が業界で激化","ベゾスとザッカーバーグが別々の若返り企業に出資——IT億万長者の代理戦争","研究成果をほぼ公開しない秘密主義——金だけ使って何も出てこない批判","山中因子の特許をめぐる法的争いがくすぶっている"],ht:"金で引き抜かれた元同僚と残った研究者の対立。年俸100万ドルの誘惑に揺れる博士研究員キャラ。"},
  {id:"turnbio",label:"Turnbio",kana:"ターンバイオ",icon:"🧴",bg:"#2a1a3a",bc:"#5a2a7a",ac:"#7a3aaa",tc:"#cc88ff",ov:"皮膚細胞のリプログラミングに特化したスタートアップ。老化した皮膚細胞を若い状態に戻す技術を開発中。創傷治癒の加速から始まり、美容医療市場への参入を狙う。市場規模は世界で1000億ドル超。",nw:["シリーズBで8500万ドルを調達。評価額が10億ドルを突破しユニコーン入り。","LVMHグループが買収交渉を進めているとの報道。創業者は否定。","FDAが皮膚リプログラミング製品の審査カテゴリを新設。","中国の大手化粧品企業が類似技術の特許を複数申請。模倣品市場が懸念される。"],dr:["医療か美容かで引き裂かれる創業者——命を救いたい科学者と儲けたいVCの衝突","LVMHエスティローダーなど大手化粧品企業が買収を狙っている","本当に効くのか臨床データの信憑性をめぐる論争","安価な類似品を中国企業が開発中という噂"],ht:"命を救いたい科学者と儲けたいVCの価値観衝突シーン。医療か美容かで引き裂かれる創業者。"},
  {id:"func",label:"Function Health",kana:"ファンクション・ヘルス",icon:"📊",bg:"#1a3a2a",bc:"#2a7a4a",ac:"#3aaa6a",tc:"#66ddaa",ov:"Peter Attia（長寿医療の世界的権威）が関わる100種類以上の血液検査サービス。年間499ドルで生物学的年齢・臓器の健康状態を可視化。シリコンバレーのエリート層に爆発的人気。個人の健康データを大規模収集している。",nw:["会員数が50万人を突破。データベースが医療研究の金の山として注目される。","大手保険会社が保険料算定への活用を検討中と報道。プライバシー団体が猛反発。","Peter Attiaが5年以内にAIが個人の死期を90日以内の精度で予測できると発言。","競合のInsideTrackerとAncestryが統合サービスを発表。市場競争が激化。"],dr:["集めた血液・遺伝子データは誰のものか——プライバシー問題が浮上","保険会社へのデータ流出リスク（不健康と判定された人が不利益を受ける）","健康格差の拡大——金持ちだけが自分の死期を知れる社会","製薬会社がこのデータを欲しがって接触してきている"],ht:"自分の余命を知ってしまった男というキャラ。データを持つ企業と、それを狙う製薬会社の情報戦。"},
  {id:"xp",label:"XPRIZE",kana:"エックスプライズ",icon:"🏆",bg:"#3a2a1a",bc:"#8a5a2a",ac:"#aa7a3a",tc:"#ffcc77",ov:"XPRIZE財団が設立した老化逆転コンペ。賞金総額1億ドル以上。世界中の研究チームが筋力・認知・免疫機能を20年若返らせる技術を競う。2023年に開始、2030年頃に結果が出る。",nw:["参加チームが600チームを突破。日本からも東大・理研チームが参加。","中間審査で韓国チームが認知機能15年若返りの予備データを提出。世界が注目。","倫理委員会が一部チームの人体実験手法に警告。非公認試験が複数国で発覚。","中国政府系チームの参加をめぐり米国側が安全保障上の懸念を表明。排除の動き。"],dr:["賞金1億ドルをめぐる国際的な研究チームの激しい競争","中国・米国・欧州の老化逆転ナショナリズム——国家が裏で支援","倫理審査をすり抜けるため審査の緩い国で人体実験を行うチームの疑惑","勝った技術が世界を支配するというパワーゲーム"],ht:"競技形式なのでスポーツ漫画的構図。各国代表チームがそれぞれの思惑を持って戦う群像劇。"},
  {id:"cal",label:"Calico",kana:"キャリコ（グーグル系）",icon:"🌐",bg:"#3a1a1a",bc:"#8a2a2a",ac:"#aa3a3a",tc:"#ff8888",ov:"GoogleのAlphabet傘下の長寿研究企業。2013年設立、AbbVieと合計15億ドルを投資。設立から10年以上経つが目立った成果を出していないと批判される。研究内容を極秘にしておりステルス企業と呼ばれる。",nw:["AbbVieとの共同研究契約が満了。更新交渉が難航しているとの報道。","主任科学者3名が相次いで退職。うち2名がAltos Labsへ移籍。","Alphabetが決算説明会でCalicoへの言及をゼロに。社内での優先度低下が示唆される。","裸デバネズミの老化メカニズム解明の論文を発表。市場は失望。"],dr:["10年・15億ドルを使って成果ゼロ——株主・社会への説明責任問題","Googleの本業（広告）と死の克服という崇高な目標の矛盾","研究者が次々と去っていき内部崩壊の噂","Alphabetの他事業に予算を奪われる内部競争"],ht:"莫大な金と優秀な人材があっても死に勝てないという絶望感。Googleという巨人の内部腐敗を描くコーポレートドラマ。"},
  {id:"ret",label:"Retro Biosciences",kana:"レトロ・バイオサイエンシズ",icon:"⚗️",bg:"#1a3a3a",bc:"#2a7a7a",ac:"#3aaa9a",tc:"#66dddd",ov:"OpenAI創業者のSam Altmanが個人で1億8000万ドルを出資した長寿スタートアップ。2021年設立。人間の健康寿命を10年延ばすをミッション。細胞自食作用（オートファジー）と血液若返りを研究。",nw:["独自開発のオートファジー促進化合物RB-01が前臨床試験で良好な結果。","Sam AltmanがRetroとOpenAIを統合する可能性に言及。AI×若返りの融合に注目。","投資家向け資料が流出。2035年までに若返り薬を市販化という野心的目標が明らかに。","Altos Labsとの人材争奪が激化。上級研究員の引き抜き合戦が続く。"],dr:["AIで世界を変えた男が次は死に挑む——メディアの熱狂と批判","1億8000万ドルを個人で出したSam Altmanの不死願望の異常性","OpenAIとの利益相反——AI開発と長寿研究、どちらが本命か","金持ちだけが若返れるという格差問題への激しい批判"],ht:"AI・若返り・宇宙と全部やろうとする神になりたい男の狂気と孤独。"},
  {id:"tr",label:"業界トレンド",kana:"ぎょうかいトレンド",icon:"📡",bg:"#2a2a1a",bc:"#7a7a2a",ac:"#9a9a3a",tc:"#dddd66",ov:"2024〜2025年、リジュビネーション業界への投資は年間60億ドル超に達した。主要トレンドは細胞リプログラミング・老化細胞除去・GLP-1薬の長寿応用・AIによる老化解析・エピジェネティック時計。FDAが老化は病気かという定義問題に直面中。",nw:["FDAが老化の予防を正式な適応症として認める審査基準を2025年末までに策定すると発表。","GLP-1薬（オゼンピック）の大規模研究で心臓老化を5年遅らせる効果が確認。製薬株が急騰。","中国・深センで若返り特区構想。規制を緩和し海外富裕層向けに臨床試験を解禁する計画。","Googleが老化解析AIのDeepAgeを発表。血液検査データだけで生物学的年齢を99%の精度で判定。"],dr:["老化=病気とFDAが認定するか否かで市場規模が10倍変わる","GLP-1が老化にも効くと判明——製薬会社が狂喜乱舞","AIがあなたは何歳で死ぬを予測できるようになってきた","中国政府が若返り研究を国家プロジェクトに——米中技術戦争に発展"],ht:"誰が最初に老化を制するかという戦いの全体像。ハゲタカ的なプロローグに使える。"},
  {id:"mn",label:"投資・資金調達",kana:"とうし・しきんちょうたつ",icon:"💰",bg:"#2a1a2a",bc:"#7a2a6a",ac:"#9a3a8a",tc:"#ff88cc",ov:"2023〜2024年の主要ディール：Altos Labs 30億ドル、BioAge Labs 1.7億ドル、NewLimit（Brian Armstrong個人出資）1億ドル超。Coinbase創業者、Amazon創業者、OpenAI創業者が全員若返りに賭けている。",nw:["a16zが総額5億ドルのBio×Longevityファンドを組成。業界最大規模。","Coinbase創業者Brian ArmstrongのNewLimitが追加資金調達。累計2億ドル超に。","ソフトバンクの孫正義が若返りはAIの次の革命と発言。日本企業への投資を示唆。","Vision Fundが若返りスタートアップへの10億ドル投資を検討中と報道。バブルを懸念する声も。"],dr:["仮想通貨で儲けた億万長者が若返り研究に流入——暗号通貨から不死という資金の流れ","死にたくない金持ちが作り出すバブル——実態のない企業への過剰投資","a16zがLongevityファンドを設立——VCが老化産業を支配しようとしている","投資回収の時間軸問題——若返り技術は20年後、VCは5年で回収したい"],ht:"若返りバブルが弾けた後を描く逆張り視点。信じた投資家・研究者・患者が全員裏切られる瞬間。"}
];

var sel=null;
var BM=JSON.parse(localStorage.getItem('rw_bm')||'[]');

function saveBM(){ localStorage.setItem('rw_bm',JSON.stringify(BM)); updateBadge(); }

function isBM(key){ return BM.some(function(b){ return b.key===key; }); }

function toggleBM(key,text,src){
  if(isBM(key)){
    BM=BM.filter(function(b){ return b.key!==key; });
  } else {
    BM.push({key:key,text:text,src:src,ts:Date.now()});
  }
  saveBM();
  // re-render star buttons without full re-render
  var btns=document.querySelectorAll('.bmbtn');
  btns.forEach(function(btn){
    if(btn.dataset.key===key) btn.textContent=isBM(key)?'★':'☆';
  });
  if(document.getElementById('page-bm').style.display!=='none') renderBM();
}

function updateBadge(){
  var badge=document.getElementById('bm-count');
  if(BM.length>0){ badge.textContent=BM.length; badge.style.display='inline'; }
  else { badge.style.display='none'; }
}

function showPage(p){
  document.getElementById('page-home').style.display=p==='home'?'block':'none';
  document.getElementById('page-bm').style.display=p==='bm'?'block':'none';
  document.querySelectorAll('.tab').forEach(function(t,i){
    t.classList.toggle('on',(p==='home'&&i===0)||(p==='bm'&&i===1));
  });
  if(p==='bm') renderBM();
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function bmBtn(key,text,src){
  return '<button class="bmbtn" data-key="'+esc(key)+'" onclick="toggleBM(\''+esc(key)+'\',\''+esc(text)+'\',\''+esc(src)+'\')">'+(isBM(key)?'★':'☆')+'</button>';
}

function renderGrid(){
  var g=document.getElementById('grid');
  g.innerHTML='';
  DATA.forEach(function(t){
    var on=sel===t.id;
    var el=document.createElement('div');
    el.className='tile';
    el.style.background=on?t.ac:t.bg;
    el.style.borderColor=on?t.tc:t.bc;
    el.style.boxShadow=on?'0 4px 20px '+t.tc+'55':'0 2px 8px rgba(0,0,0,.25)';
    el.innerHTML='<div class="ti">'+t.icon+'</div>'
      +'<div class="tn" style="color:'+t.tc+'">'+esc(t.label)+'</div>'
      +'<div class="tk" style="color:'+(on?'rgba(255,255,255,.8)':'rgba(255,255,255,.45)')+'">（'+esc(t.kana)+'）</div>';
    el.onclick=function(){ sel=(sel===t.id)?null:t.id; renderGrid(); renderDetail(); };
    g.appendChild(el);
  });
}

function renderDetail(){
  var det=document.getElementById('det');
  var emp=document.getElementById('emp');
  if(!sel){ det.style.display='none'; emp.style.display='block'; return; }
  var t=DATA.find(function(x){ return x.id===sel; });
  emp.style.display='none';
  det.style.display='block';

  var nwHTML=t.nw.map(function(n,i){
    var k=t.id+'_nw'+i;
    var url='https://news.google.com/search?q='+encodeURIComponent(n)+'&hl=ja&gl=JP&ceid=JP:ja';
    return '<div class="nitem" onclick="window.open(\''+url+'\',\'_blank\')" style="cursor:pointer"><span class="ibullet" style="color:#e67e22">&#9670;</span><div class="itext">'+esc(n)+'<div style="font-size:12px;color:#b07030;margin-top:5px">&#128240; タップして記事を読む</div></div>'+bmBtn(k,n,t.label+' / ニュース')+'</div>';
  }).join('');

  var drHTML=t.dr.map(function(n,i){
    var k=t.id+'_dr'+i;
    return '<div class="ditem"><span class="ibullet" style="color:#e74c3c">&#9654;</span><div class="itext">'+esc(n)+'</div>'+bmBtn(k,n,t.label+' / ドラマ要素')+'</div>';
  }).join('');

  var htKey=t.id+'_ht';
  det.innerHTML=
    '<div class="dtop" style="background:'+t.ac+';box-shadow:0 4px 16px '+t.tc+'44">'
      +'<h2>'+t.icon+' '+esc(t.label)+'</h2>'
      +'<p>（'+esc(t.kana)+'）</p>'
    +'</div>'
    +'<div class="card" style="border-left-color:'+t.tc+'">'
      +'<div class="ctitle" style="color:'+t.tc+';border-left-color:'+t.tc+'">概要</div>'
      +'<div class="ctext">'+esc(t.ov)+'</div>'
    +'</div>'
    +'<div class="card" style="border-left-color:#e67e22">'
      +'<div class="ctitle" style="color:#e67e22;border-left-color:#e67e22">最新ニュース</div>'
      +nwHTML
    +'</div>'
    +'<div class="card" style="border-left-color:#e74c3c">'
      +'<div class="ctitle" style="color:#e74c3c;border-left-color:#e74c3c">ドラマになる要素</div>'
      +drHTML
    +'</div>'
    +'<div class="card hitem" style="background:#f0fff4;border-left-color:#27ae60;display:block">'
      +'<div class="ctitle" style="color:#27ae60;border-left-color:#27ae60">漫画キャラ・シーンのヒント</div>'
      +'<div style="position:relative"><div class="ctext" style="color:#1a4a2a;padding-right:36px">'+esc(t.ht)+'</div>'+bmBtn(htKey,t.ht,t.label+' / ヒント')+'</div>'
    +'</div>';

  setTimeout(function(){ det.scrollIntoView({behavior:'smooth',block:'start'}); },50);
}

function renderBM(){
  var list=document.getElementById('bm-list');
  if(BM.length===0){
    list.innerHTML='<div class="bm-empty">ブックマークはまだありません<br>★ボタンで保存できます</div>';
    return;
  }
  list.innerHTML=BM.slice().reverse().map(function(b){
    return '<div class="bm-card">'
      +'<div class="bm-tag">'+esc(b.src)+'</div>'
      +'<div class="bm-text">'+esc(b.text)+'</div>'
      +'<button class="bm-del" onclick="removeBM(\''+esc(b.key)+'\')">&#10005;</button>'
    +'</div>';
  }).join('');
}

function removeBM(key){
  BM=BM.filter(function(b){ return b.key!==key; });
  saveBM(); renderBM();
}

function clearAll(){
  if(confirm('ブックマークをすべて削除しますか？')){ BM=[]; saveBM(); renderBM(); }
}

updateBadge();
renderGrid();
showPage('home');
</script>

</body>
</html>
