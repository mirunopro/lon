<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>REJUVENATION WAR</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#eef0f4;font-family:'Noto Sans JP',sans-serif;-webkit-text-size-adjust:100%}
#hdr{position:sticky;top:0;z-index:50;background:#1a1a2a;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 12px rgba(0,0,0,.4)}
#hdr h1{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:4px;color:#fff}
#hdr p{font-size:11px;color:#8888aa;letter-spacing:3px}
.dot{width:9px;height:9px;border-radius:50%;background:#4af;animation:blink 2s infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
#sub{padding:12px;font-size:14px;color:#666;text-align:center}
#grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 12px 12px}
.tile{border-radius:12px;padding:20px 14px;cursor:pointer;text-align:left;border:2px solid;transition:all .15s}
.tile .ti{font-size:32px;margin-bottom:8px}
.tile .tn{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;line-height:1.2;margin-bottom:5px}
.tile .tk{font-size:13px;opacity:.7}
#det{padding:0 12px 60px;display:none}
#emp{padding:60px 20px;text-align:center;color:#bbb;font-size:15px;line-height:3}
.dtop{border-radius:10px;padding:14px 16px;margin-bottom:12px}
.dtop h2{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:#fff}
.dtop p{font-size:14px;color:rgba(255,255,255,.75);margin-top:3px}
.card{background:#fff;border-radius:10px;padding:16px;margin-bottom:12px;border-left:5px solid #ccc;box-shadow:0 2px 6px rgba(0,0,0,.06)}
.ctitle{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;margin-bottom:12px;padding-left:8px;border-left:3px solid}
.ctext{font-size:17px;line-height:2.1;color:#222}
.ditem{display:flex;gap:10px;margin-bottom:12px;align-items:flex-start}
.ditem .db{color:#e74c3c;font-size:18px;flex-shrink:0;margin-top:2px}
.ditem .dt{font-size:17px;color:#333;line-height:1.9}
.link-btn{display:flex;align-items:center;gap:10px;background:#fff;border-radius:10px;padding:14px 16px;margin-bottom:10px;border:2px solid #ddd;text-decoration:none;box-shadow:0 2px 6px rgba(0,0,0,.06);-webkit-tap-highlight-color:rgba(0,0,0,.1)}
.link-btn:active{background:#f5f5f5}
.link-icon{font-size:22px;flex-shrink:0}
.link-body .ln{font-size:16px;color:#222;font-weight:700;line-height:1.4}
.link-body .ld{font-size:13px;color:#888;margin-top:3px}
.link-arrow{margin-left:auto;font-size:20px;color:#bbb;flex-shrink:0}
</style>
</head>

  <div style="display:flex;align-items:center;gap:7px"><div class="dot"></div><span style="font-size:11px;color:#8888aa;letter-spacing:2px">LIVE</span></div>
</div>

<div id="grid"></div>
<div id="det"></div>
<div id="emp">上のタイルをタップすると<br>業界インテリジェンスが表示されます</div>

var sel = null;
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function renderGrid(){
  var g=document.getElementById('grid');
  g.innerHTML='';
  DATA.forEach(function(t){
    var on=sel===t.id;
    var el=document.createElement('div');
    el.className='tile';
    el.style.background=on?t.ac:t.bg;
    el.style.borderColor=on?t.tc:t.bc;
    el.style.boxShadow=on?'0 4px 20px '+t.tc+'55':'0 2px 8px rgba(0,0,0,.25)';
    el.innerHTML='<div class="ti">'+t.icon+'</div>'
      +'<div class="tn" style="color:'+t.tc+'">'+esc(t.label)+'</div>'
      +'<div class="tk" style="color:'+(on?'rgba(255,255,255,.8)':'rgba(255,255,255,.45)')+'">（'+esc(t.kana)+'）</div>';
    el.onclick=function(){ sel=(sel===t.id)?null:t.id; renderGrid(); renderDetail(); };
    g.appendChild(el);
  });
}

function renderDetail(){
  var det=document.getElementById('det');
  var emp=document.getElementById('emp');
  if(!sel){ det.style.display='none'; emp.style.display='block'; return; }
  var t=DATA.find(function(x){ return x.id===sel; });
  emp.style.display='none';
  det.style.display='block';

  var drHTML=t.dr.map(function(n){
    return '<div class="ditem"><span class="db">&#9654;</span><div class="dt">'+esc(n)+'</div></div>';
  }).join('');

  var linkHTML=t.links.map(function(lk){
    return '<a class="link-btn" href="'+lk.url+'" target="_blank" rel="noreferrer">'
      +'<span class="link-icon">'+lk.icon+'</span>'
      +'<div class="link-body"><div class="ln">'+esc(lk.name)+'</div><div class="ld">'+esc(lk.desc)+'</div></div>'
      +'<span class="link-arrow">&#8250;</span>'
      +'</a>';
  }).join('');

  det.innerHTML=
    '<div class="dtop" style="background:'+t.ac+';margin-top:4px;box-shadow:0 4px 16px '+t.tc+'44">'
      +'<h2>'+t.icon+' '+esc(t.label)+'</h2>'
      +'<p>（'+esc(t.kana)+'）</p>'
    +'</div>'
    +'<div class="card" style="border-left-color:'+t.tc+'">'
      +'<div class="ctitle" style="color:'+t.tc+';border-left-color:'+t.tc+'">概要</div>'
      +'<div class="ctext">'+esc(t.ov)+'</div>'
    +'</div>'
    +'<div class="card" style="border-left-color:#e74c3c">'
      +'<div class="ctitle" style="color:#e74c3c;border-left-color:#e74c3c">ドラマになる要素</div>'
      +drHTML
    +'</div>'
    +'<div class="card" style="background:#f0fff4;border-left-color:#27ae60">'
      +'<div class="ctitle" style="color:#27ae60;border-left-color:#27ae60">漫画キャラ・シーンのヒント</div>'
      +'<div class="ctext" style="color:#1a4a2a">'+esc(t.ht)+'</div>'
    +'</div>'
    +'<div class="card" style="border-left-color:#3498db">'
      +'<div class="ctitle" style="color:#3498db;border-left-color:#3498db">最新記事を読む</div>'
      +linkHTML
    +'</div>';

  setTimeout(function(){ det.scrollIntoView({behavior:'smooth',block:'start'}); },50);
}

renderGrid();
